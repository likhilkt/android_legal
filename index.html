<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Diary — Legal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont,
                 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0F0F1A;
    color: #F0F0F0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #16213E;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    border: 1px solid rgba(253,203,110,0.2);
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
  }
  h1 { font-size: 28px; color: #FDCB6E; margin-bottom: 6px; }
  p  { color: #B0B0D0; font-size: 14px; margin-bottom: 40px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a {
    display: block;
    padding: 16px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  a:hover { opacity: 0.85; }
  .a-privacy {
    background: #FDCB6E;
    color: #0F0F1A;
  }
  .a-terms {
    background: transparent;
    color: #FDCB6E;
    border: 2px solid #FDCB6E;
  }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: #444;
  }
</style>
</head>
<body>
<div class="card">
  <span class="icon">📔</span>
  <h1>Audio Diary</h1>
  <p>Your private voice journal — all data stays on your device</p>
  <div class="links">
    <a href="privacy_policy.html" class="a-privacy">🔒 Privacy Policy</a>
    <a href="terms.html" class="a-terms">📄 Terms &amp; Conditions</a>
  </div>
  <div class="footer">© 2026 Audio Diary. All rights reserved.</div>
</div>
</body>
</html>
